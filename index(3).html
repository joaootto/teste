<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Treino</title>
<style>
:root {
  --bg:       #1a1a1a;
  --surface:  #242424;
  --surface2: #2e2e2e;
  --border:   #3a3a3a;
  --accent:   #3b82f6;
  --accent2:  #60a5fa;
  --green:    #22c55e;
  --red:      #ef4444;
  --yellow:   #f59e0b;
  --text:     #f5f5f5;
  --muted:    #888;
  --muted2:   #555;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;padding-bottom:110px;}

/* ── HEADER ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;height:52px;}
.header-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:.3px;}
.header-date{font-size:12px;color:var(--muted);}

/* workout timer bar */
.timer-bar{display:none;align-items:center;justify-content:space-between;padding:8px 0 10px;}
.timer-bar.active{display:flex;}
.wt-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.wt-time{font-size:22px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:1px;}
.wt-start-btn{background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:12px;font-weight:700;padding:7px 16px;cursor:pointer;letter-spacing:.5px;}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:99;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;flex-shrink:0;}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}

.page{display:none;padding:14px;}
.page.active{display:block;}

/* ── DATE BAR ── */
.date-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.date-bar label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.date-bar input[type=date]{background:transparent;border:none;color:var(--text);font-size:14px;font-weight:600;flex:1;min-width:0;-webkit-appearance:none;}
.date-bar input[type=date]:focus{outline:none;}

/* ── EXERCISE GROUP ── */
.ex-group{margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.ex-header{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;-webkit-user-select:none;user-select:none;}
.ex-header:active{background:var(--surface2);}
.ex-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.ex-color-bar{width:4px;height:36px;border-radius:4px;flex-shrink:0;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ex-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px;}
.ex-arr{font-size:11px;color:var(--muted2);transition:transform .2s;display:inline-block;}
.ex-group.open .ex-arr{transform:rotate(180deg);}
.ex-body{display:none;border-top:1px solid var(--border);}
.ex-group.open .ex-body{display:block;}

/* ── PREV ROW ── */
.prev-row{background:var(--surface2);padding:10px 14px;border-bottom:1px solid var(--border);}
.prev-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.prev-series{font-size:12px;color:var(--muted);line-height:1.9;}
.prev-series span{color:#aaa;font-weight:500;}

/* ── SERIES TABLE ── */
.stbl-wrap{padding:10px 14px 4px;}
.stbl{width:100%;border-collapse:collapse;}
.stbl thead th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:0 4px 8px;text-align:center;}
.stbl thead th:first-child{text-align:left;width:38px;padding-left:0;}
.stbl thead th:last-child{width:44px;}
.stbl tbody tr{border-top:1px solid var(--border);}
.stbl td{padding:8px 4px;text-align:center;vertical-align:middle;}
.stbl td:first-child{padding-left:0;text-align:left;}
.stbl td:last-child{padding-right:0;}

.s-num{font-size:15px;font-weight:800;color:var(--muted);}
.s-bdg{display:flex;flex-direction:column;gap:2px;margin-top:3px;}

.stbl input[type=number]{
  background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-size:16px;font-weight:700;padding:9px 4px;
  width:100%;text-align:center;-webkit-appearance:none;appearance:none;
}
.stbl input[type=number]:focus{outline:none;border-color:var(--accent);background:var(--bg);}

/* RIR */
.rir-wrap{display:flex;gap:3px;justify-content:center;}
.rir-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;}
.rir-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent);}

/* REST TIMER BUTTON */
.rest-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rest-btn.counting{border-color:var(--yellow);color:var(--yellow);background:rgba(245,158,11,.1);}
.rest-btn.done{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1);}

/* OBS */
.obs-wrap{padding:6px 14px 12px;}
.obs-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.obs-wrap input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;padding:9px 12px;-webkit-appearance:none;}
.obs-wrap input[type=text]::placeholder{color:var(--muted2);}
.obs-wrap input[type=text]:focus{outline:none;border-color:var(--accent);}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:2px 5px;border-radius:8px;}
.bu{background:rgba(34,197,94,.15);color:var(--green);}
.bd{background:rgba(239,68,68,.15);color:var(--red);}
.bs{background:rgba(245,158,11,.12);color:var(--yellow);}

/* ── REST OVERLAY ── */
.rest-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.rest-overlay.open{display:flex;}
.rest-ring{position:relative;width:200px;height:200px;}
.rest-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.rest-ring circle{fill:none;stroke-width:8;}
.rest-ring .bg-circle{stroke:var(--surface2);}
.rest-ring .prog-circle{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .9s linear;}
.rest-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rest-time{font-size:52px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:2px;}
.rest-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.rest-title{font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.rest-options{display:flex;gap:10px;margin-top:8px;}
.rest-opt{padding:10px 18px;border-radius:50px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;}
.rest-opt.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.rest-skip{margin-top:6px;padding:12px 32px;border-radius:50px;border:none;background:var(--surface);color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;}

/* ── FINISH BTN ── */
.finish-btn{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;letter-spacing:.5px;padding:16px 0;width:calc(100% - 32px);max-width:420px;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,.4);z-index:200;}
.finish-btn:active{opacity:.85;}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-end;justify-content:center;padding:0;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:22px 22px 0 0;padding:28px 22px 36px;width:100%;max-width:480px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px;}
.modal-icon{font-size:40px;margin-bottom:10px;text-align:center;}
.modal-title{font-size:20px;font-weight:800;margin-bottom:8px;text-align:center;}
.modal-text{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px;text-align:center;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}
.mbtn{width:100%;padding:15px;border-radius:13px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
.mbtn.ok{background:var(--accent);color:#fff;}
.mbtn.no{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}

/* ── SUMMARY ── */
.summary-bg{display:none;position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;padding:0 0 40px;}
.summary-bg.open{display:block;}
.sum-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.sum-title{font-size:18px;font-weight:800;color:var(--text);}
.sum-close{background:var(--surface2);border:1px solid var(--border);border-radius:50px;color:var(--muted);font-size:13px;font-weight:600;padding:8px 16px;cursor:pointer;}
.sum-hero{text-align:center;padding:28px 16px 16px;}
.sum-emoji{font-size:52px;margin-bottom:10px;}
.sum-headline{font-size:24px;font-weight:900;letter-spacing:.5px;margin-bottom:6px;}
.sum-sub{font-size:13px;color:var(--muted);}
.sum-duration{font-size:13px;color:var(--accent);font-weight:700;margin-top:6px;}
.sum-stats{display:flex;gap:10px;padding:0 14px 20px;}
.sum-stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;}
.sum-stat-num{font-size:28px;font-weight:900;margin-bottom:4px;}
.sum-stat-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.stat-g{color:var(--green);}
.stat-y{color:var(--yellow);}
.stat-r{color:var(--red);}
.sum-section{padding:0 14px;margin-bottom:10px;}
.sum-sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-left:2px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.sum-card-header{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;}
.sum-card-name{font-size:14px;font-weight:700;flex:1;}
.sum-card-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.tag-up  {background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.tag-same{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.25);}
.tag-down{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.tag-new {background:rgba(59,130,246,.12);color:var(--accent);border:1px solid rgba(59,130,246,.25);}
.sum-ser-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid var(--border);font-size:13px;flex-wrap:wrap;gap:6px;}
.sum-ser-lbl{color:var(--muted);font-weight:700;min-width:24px;}
.sum-ser-vals{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.sum-arrow{color:var(--muted2);font-size:12px;}
.sum-val{font-weight:700;}
.sdiff{font-size:11px;font-weight:700;padding:2px 6px;border-radius:8px;}
.sdiff-up  {background:rgba(34,197,94,.15);color:var(--green);}
.sdiff-same{background:rgba(245,158,11,.12);color:var(--yellow);}
.sdiff-down{background:rgba(239,68,68,.15);color:var(--red);}

/* HISTORY */
.hcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.hhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ht{font-size:15px;font-weight:700;color:var(--accent);}
.hd{font-size:11px;color:var(--muted);}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.hrow:last-child{border-bottom:none;}
.hex{color:var(--muted);flex:1;}
.hval{font-weight:600;font-size:12px;text-align:right;}
.hobs{font-size:11px;color:var(--muted2);font-style:italic;}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.eicon{font-size:44px;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.8;}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d0f14;font-weight:800;font-size:13px;padding:12px 24px;border-radius:50px;z-index:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">TREINO</div>
    <div class="header-date" id="hdate"></div>
  </div>
  <div class="timer-bar" id="timerBar">
    <div>
      <div class="wt-label">DURAÇÃO</div>
      <div class="wt-time" id="wtDisplay">00:00</div>
    </div>
    <div style="text-align:right">
      <div class="wt-label" style="margin-bottom:4px">TREINO ATIVO</div>
      <div style="width:8px;height:8px;background:var(--green);border-radius:50%;margin-left:auto;animation:pulse 1.5s infinite;"></div>
    </div>
  </div>
</div>

<style>@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}</style>

<div class="tabs" id="tabs">
  <div class="tab active" data-key="a1">A1</div>
  <div class="tab" data-key="p1">P1</div>
  <div class="tab" data-key="p2">P2</div>
  <div class="tab" data-key="hist">Histórico</div>
</div>

<div id="page-a1" class="page active"></div>
<div id="page-p1" class="page"></div>
<div id="page-p2" class="page"></div>
<div id="page-hist" class="page"></div>

<button class="finish-btn" id="finBtn">Finalizar Treino</button>

<!-- Confirm modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-icon">💪</div>
    <div class="modal-title">Finalizar treino?</div>
    <div class="modal-text">O treino vai pro histórico e os dados viram referência pra comparar na próxima sessão.</div>
    <div class="modal-btns">
      <button class="mbtn ok" id="mok">Confirmar</button>
      <button class="mbtn no" id="mno">Cancelar</button>
    </div>
  </div>
</div>

<!-- Rest overlay -->
<div class="rest-overlay" id="restOverlay">
  <div class="rest-title">DESCANSO</div>
  <div class="rest-ring">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle class="bg-circle" cx="100" cy="100" r="88"/>
      <circle class="prog-circle" id="restProg" cx="100" cy="100" r="88" stroke-dasharray="553" stroke-dashoffset="0"/>
    </svg>
    <div class="rest-center">
      <div class="rest-time" id="restDisplay">01:30</div>
      <div class="rest-label">restantes</div>
    </div>
  </div>
  <div class="rest-options">
    <div class="rest-opt" onclick="setRestTime(60)">1 min</div>
    <div class="rest-opt active" onclick="setRestTime(90)">1:30</div>
    <div class="rest-opt" onclick="setRestTime(120)">2 min</div>
    <div class="rest-opt" onclick="setRestTime(180)">3 min</div>
  </div>
  <button class="rest-skip" onclick="skipRest()">Pular descanso</button>
</div>

<!-- Summary -->
<div class="summary-bg" id="summaryBg">
  <div class="sum-header">
    <div class="sum-title">Resumo</div>
    <button class="sum-close" id="sumClose">Fechar</button>
  </div>
  <div class="sum-hero">
    <div class="sum-emoji" id="sumEmoji">💪</div>
    <div class="sum-headline" id="sumHeadline">TREINO SALVO!</div>
    <div class="sum-sub" id="sumSub"></div>
    <div class="sum-duration" id="sumDuration"></div>
  </div>
  <div class="sum-stats" id="sumStats"></div>
  <div id="sumUp"   class="sum-section"></div>
  <div id="sumSame" class="sum-section"></div>
  <div id="sumDown" class="sum-section"></div>
  <div id="sumNew"  class="sum-section"></div>
</div>

<div class="toast" id="toast">✅ Treino salvo!</div>

<script>
var T = {
  a1:{label:"A1 — Empurrar",color:"#3b82f6",ex:[
    {n:"Elevação Lateral na Máquina",s:3},{n:"Supino Articulado",s:1},
    {n:"Extensora",s:3},{n:"Desenvolvimento Máquina",s:2},
    {n:"Fly",s:3},{n:"Tríceps Costas pra Polia",s:2},{n:"Adutora",s:2}
  ]},
  p1:{label:"P1 — Puxar",color:"#22c55e",ex:[
    {n:"Triângulo",s:2},{n:"T-Bar Row",s:2},{n:"SLDL",s:1},
    {n:"Panturrilha",s:2},{n:"Mesa Flexora",s:2},{n:"Puxada Aberta",s:2},
    {n:"Bíceps",s:2},{n:"Pélvica",s:2},{n:"Post Ombro",s:1}
  ]},
  p2:{label:"P2 — Puxar 2",color:"#a855f7",ex:[
    {n:"Panturrilha",s:2},{n:"Bíceps",s:2},{n:"Triângulo",s:2},
    {n:"T-Bar Row",s:2},{n:"SLDL",s:1},{n:"Puxada Aberta",s:2},
    {n:"Pélvica",s:2},{n:"Post Ombro",s:1}
  ]}
};

var cur='a1',ST={},HI=[];
function lget(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lset(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function load(){try{ST=JSON.parse(lget('st')||'{}');}catch(e){ST={};}try{HI=JSON.parse(lget('hi')||'[]');}catch(e){HI=[];}}
function save(){lset('st',JSON.stringify(ST));lset('hi',JSON.stringify(HI));}
load();

// ── WORKOUT TIMER ──
var wtStart=0, wtInterval=null, wtRunning=false;
function startWT(){
  if(wtRunning)return;
  wtStart=Date.now()-(ST['wt_elapsed']||0);
  wtRunning=true;
  document.getElementById('timerBar').classList.add('active');
  wtInterval=setInterval(tickWT,1000);
  tickWT();
}
function tickWT(){
  var el=Date.now()-wtStart;
  ST['wt_elapsed']=el;
  var s=Math.floor(el/1000);
  var mm=String(Math.floor(s/60)).padStart(2,'0');
  var ss=String(s%60).padStart(2,'0');
  document.getElementById('wtDisplay').textContent=mm+':'+ss;
}
function stopWT(){
  clearInterval(wtInterval); wtRunning=false;
  var el=ST['wt_elapsed']||0;
  delete ST['wt_elapsed'];
  save();
  return el;
}
function formatDuration(ms){
  var s=Math.floor(ms/1000);
  if(s<60)return s+'s';
  var m=Math.floor(s/60), sc=s%60;
  return m+'min'+(sc>0?' '+sc+'s':'');
}
// resume if was running
if(ST['wt_elapsed']){startWT();}

// ── REST TIMER ──
var restDur=90, restLeft=90, restInt=null, restActive=false, restCirc=553;
function openRest(){
  restLeft=restDur; restActive=true;
  document.getElementById('restOverlay').classList.add('open');
  updateRestDisplay();
  clearInterval(restInt);
  restInt=setInterval(tickRest,1000);
  // update active button
  document.querySelectorAll('.rest-opt').forEach(function(b){
    b.classList.toggle('active', parseInt(b.getAttribute('onclick').match(/\d+/)[0])===restDur);
  });
}
function tickRest(){
  restLeft--;
  updateRestDisplay();
  if(restLeft<=0){skipRest(); playBeep();}
}
function updateRestDisplay(){
  var mm=String(Math.floor(restLeft/60)).padStart(2,'0');
  var ss=String(restLeft%60).padStart(2,'0');
  document.getElementById('restDisplay').textContent=mm+':'+ss;
  var prog=document.getElementById('restProg');
  var pct=restLeft/restDur;
  prog.style.strokeDashoffset=String(restCirc*(1-pct));
}
function setRestTime(sec){
  restDur=sec; restLeft=sec;
  clearInterval(restInt);
  restInt=setInterval(tickRest,1000);
  updateRestDisplay();
  document.querySelectorAll('.rest-opt').forEach(function(b){
    b.classList.toggle('active', parseInt(b.getAttribute('onclick').match(/\d+/)[0])===sec);
  });
}
function skipRest(){
  clearInterval(restInt); restActive=false;
  document.getElementById('restOverlay').classList.remove('open');
}
function playBeep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(); var g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=880; g.gain.value=0.3;
    o.start(); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    o.stop(ctx.currentTime+0.4);
  }catch(e){}
}

// ── TABS ──
document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).toUpperCase();
document.getElementById('tabs').addEventListener('click',function(e){
  var tab=e.target.closest('.tab'); if(!tab)return;
  var key=tab.getAttribute('data-key');
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  tab.classList.add('active');
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+key).classList.add('active');
  cur=key;
  document.getElementById('finBtn').style.display=key==='hist'?'none':'block';
  if(key==='hist')renderHist(); else renderT(key);
});

function bdg(a,b,u){
  if(a===''||b==='')return '';
  var av=parseFloat(a),bv=parseFloat(b); if(isNaN(av)||isNaN(bv))return '';
  var d=Math.round((av-bv)*10)/10;
  if(d>0)return '<span class="badge bu">+'+d+(u||'')+'</span>';
  if(d<0)return '<span class="badge bd">'+d+(u||'')+'</span>';
  return '<span class="badge bs">='+(u||'')+'</span>';
}
function fmtPrev(r,w){
  var parts=[];
  if(r)parts.push(r+' Reps');
  if(w)parts.push(w+'kg');
  return parts.join(' x ');
}
function toggleEx(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}
function setRir(key,i,s,val){
  var k='rir_'+key+'_'+i+'_'+s;
  ST[k]=(ST[k]===val)?-1:val; save();
  for(var r=0;r<=2;r++){var b=document.getElementById('rb_'+key+'_'+i+'_'+s+'_'+r);if(b)b.className='rir-btn'+(ST[k]===r?' sel':'');}
}

function renderT(key){
  var t=T[key]; if(!t)return;
  var today=new Date().toISOString().split('T')[0];
  var dv=ST[key+'_d']||today;
  var h='';
  h+='<div class="date-bar"><label>Data</label><input type="date" id="di_'+key+'" value="'+dv+'"></div>';

  for(var i=0;i<t.ex.length;i++){
    var ex=t.ex[i], gid='eg_'+key+'_'+i;
    var filled=0;
    for(var s=1;s<=ex.s;s++){if(ST['r_'+key+'_'+i+'_'+s]||ST['w_'+key+'_'+i+'_'+s])filled++;}
    var openCls=(filled>0||i===0)?' open':'';

    h+='<div class="ex-group'+openCls+'" id="'+gid+'">';
    h+='<div class="ex-header" onclick="toggleEx(\''+gid+'\')">';
    h+='<div class="ex-left">';
    h+='<div class="ex-color-bar" style="background:'+t.color+'"></div>';
    h+='<div class="ex-info">';
    h+='<div class="ex-name">'+ex.n+'</div>';
    h+='<div class="ex-meta">'+ex.s+' séries'+(filled?' · '+filled+' preenchidas':'')+'</div>';
    h+='</div></div>';
    h+='<span class="ex-arr">▾</span></div>';

    h+='<div class="ex-body">';

    // prev
    var prevLines=[];
    for(var s=1;s<=ex.s;s++){
      var prv=ST['pr_'+key+'_'+i+'_'+s]||'', pwv=ST['pw_'+key+'_'+i+'_'+s]||'';
      if(prv||pwv) prevLines.push('<span>ANT S'+s+':</span> '+fmtPrev(prv,pwv));
    }
    if(prevLines.length){
      h+='<div class="prev-row"><div class="prev-title">Último treino</div>';
      h+='<div class="prev-series">'+prevLines.join('<br>')+'</div></div>';
    }

    // table
    h+='<div class="stbl-wrap"><table class="stbl">';
    h+='<thead><tr><th>S</th><th>Reps</th><th>Peso</th><th>RIR</th><th>⏱</th></tr></thead><tbody>';
    for(var s=1;s<=ex.s;s++){
      var rk='r_'+key+'_'+i+'_'+s, wk='w_'+key+'_'+i+'_'+s;
      var prk='pr_'+key+'_'+i+'_'+s, pwk='pw_'+key+'_'+i+'_'+s;
      var rirk='rir_'+key+'_'+i+'_'+s;
      var rv=ST[rk]||'', wv=ST[wk]||'';
      var prv=ST[prk]||'', pwv=ST[pwk]||'';
      var rirv=ST[rirk]!==undefined?ST[rirk]:-1;
      h+='<tr>';
      h+='<td><div class="s-num">'+s+'</div><div class="s-bdg">'+bdg(rv,prv,'')+''+bdg(wv,pwv,'kg')+'</div></td>';
      h+='<td><input type="number" inputmode="numeric" pattern="[0-9]*" placeholder="—" value="'+rv+'" onchange="updAndStart(\''+key+'\',\''+rk+'\',this.value)"></td>';
      h+='<td><input type="number" inputmode="decimal" pattern="[0-9.]*" step="0.5" placeholder="—" value="'+wv+'" onchange="upd(\''+wk+'\',this.value)"></td>';
      h+='<td><div class="rir-wrap">';
      for(var r=0;r<=2;r++){
        h+='<div class="rir-btn'+(rirv===r?' sel':'')+'" id="rb_'+key+'_'+i+'_'+s+'_'+r+'" onclick="setRir(\''+key+'\','+i+','+s+','+r+')">'+r+'</div>';
      }
      h+='</div></td>';
      h+='<td><button class="rest-btn" onclick="openRest()" title="Descanso">⏱</button></td>';
      h+='</tr>';
    }
    h+='</tbody></table></div>';

    var obsk='obs_'+key+'_'+i, obsv=ST[obsk]||'';
    h+='<div class="obs-wrap"><div class="obs-lbl">Obs / Config Máquina</div>';
    h+='<input type="text" placeholder="Ex: polia 3, assento furo 2..." value="'+obsv+'" onchange="upd(\''+obsk+'\',this.value)"></div>';
    h+='</div></div>';
  }

  document.getElementById('page-'+key).innerHTML=h;
  var di=document.getElementById('di_'+key);
  if(di)di.addEventListener('change',function(){ST[key+'_d']=this.value;save();});
}

function upd(k,v){ST[k]=v;save();}
function updAndStart(key,k,v){
  ST[k]=v; save();
  if(!wtRunning) startWT();
}

function renderHist(){
  var el=document.getElementById('page-hist');
  if(!HI.length){el.innerHTML='<div class="empty"><div class="eicon">📋</div><p>Nenhum treino finalizado ainda.<br>Preencha e toque em <strong>Finalizar</strong>.</p></div>';return;}
  var h='';
  for(var i=0;i<HI.length;i++){
    var e=HI[i];
    var ds=new Date(e.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
    var dur=e.duration?' · '+formatDuration(e.duration):'';
    h+='<div class="hcard"><div class="hhead"><span class="ht">'+e.treino+'</span><span class="hd">'+ds+dur+'</span></div>';
    for(var j=0;j<e.ex.length;j++){
      var x=e.ex[j];
      var rir=x.rir>=0?' · RIR '+x.rir:'';
      h+='<div class="hrow"><span class="hex">'+x.n+' S'+x.s+'</span>';
      h+='<div class="hval">'+fmtPrev(x.r,x.w)+rir+(x.obs?'<div class="hobs">'+x.obs+'</div>':'')+'</div></div>';
    }
    h+='</div>';
  }
  el.innerHTML=h;
}

// modals
document.getElementById('finBtn').addEventListener('click',function(){document.getElementById('modal').classList.add('open');});
document.getElementById('mno').addEventListener('click',function(){document.getElementById('modal').classList.remove('open');});
document.getElementById('mok').addEventListener('click',function(){document.getElementById('modal').classList.remove('open');finishT();});
document.getElementById('sumClose').addEventListener('click',function(){document.getElementById('summaryBg').classList.remove('open');});

function finishT(){
  var key=cur, t=T[key]; if(!t)return;
  var elapsed=stopWT();
  var today=new Date().toISOString().split('T')[0];
  var entry={treino:t.label,date:ST[key+'_d']||today,duration:elapsed,ex:[]};
  var comparison=[];

  for(var i=0;i<t.ex.length;i++){
    var ex=t.ex[i], obsv=ST['obs_'+key+'_'+i]||'';
    var exComp={name:ex.n,series:[]};
    for(var s=1;s<=ex.s;s++){
      var rk='r_'+key+'_'+i+'_'+s, wk='w_'+key+'_'+i+'_'+s;
      var prk='pr_'+key+'_'+i+'_'+s, pwk='pw_'+key+'_'+i+'_'+s;
      var rirk='rir_'+key+'_'+i+'_'+s;
      var rv=ST[rk]||'', wv=ST[wk]||'';
      var prv=ST[prk]||'', pwv=ST[pwk]||'';
      var rirv=ST[rirk]!==undefined?ST[rirk]:-1;
      if(rv||wv){
        entry.ex.push({n:ex.n,s:s,r:rv,w:wv,rir:rirv,obs:obsv});
        exComp.series.push({s:s,r:rv,w:wv,pr:prv,pw:pwv});
      }
      ST[prk]=rv; ST[pwk]=wv;
      delete ST[rk]; delete ST[wk]; delete ST[rirk];
    }
    if(exComp.series.length) comparison.push(exComp);
    delete ST['obs_'+key+'_'+i];
  }
  ST[key+'_d']=today;
  HI.unshift(entry); save(); renderT(key);
  document.getElementById('timerBar').classList.remove('active');
  showSummary(t.label, comparison, elapsed);
}

function showSummary(label, comparison, elapsed){
  var nUp=0,nSame=0,nDown=0,nNew=0;
  var upL=[],sameL=[],downL=[],newL=[];

  for(var i=0;i<comparison.length;i++){
    var ex=comparison[i];
    var hasPrev=false;
    for(var j=0;j<ex.series.length;j++){if(ex.series[j].pr||ex.series[j].pw){hasPrev=true;break;}}
    var st='same';
    if(!hasPrev){st='new';}
    else{
      var anyUp=false,anyDown=false;
      for(var j=0;j<ex.series.length;j++){
        var sr=ex.series[j];
        var rd=(sr.r&&sr.pr)?parseFloat(sr.r)-parseFloat(sr.pr):0;
        var wd=(sr.w&&sr.pw)?parseFloat(sr.w)-parseFloat(sr.pw):0;
        if(rd>0||wd>0)anyUp=true; if(rd<0||wd<0)anyDown=true;
      }
      st=anyUp?'up':(anyDown?'down':'same');
    }

    var c='<div class="sum-card"><div class="sum-card-header"><div class="sum-card-name">'+ex.name+'</div>';
    if(st==='up')  {c+='<span class="sum-card-tag tag-up">↑ Subiu</span>';nUp++;}
    if(st==='same'){c+='<span class="sum-card-tag tag-same">= Manteve</span>';nSame++;}
    if(st==='down'){c+='<span class="sum-card-tag tag-down">↓ Desceu</span>';nDown++;}
    if(st==='new') {c+='<span class="sum-card-tag tag-new">★ Novo</span>';nNew++;}
    c+='</div>';

    for(var j=0;j<ex.series.length;j++){
      var sr=ex.series[j];
      c+='<div class="sum-ser-row"><span class="sum-ser-lbl">S'+sr.s+'</span><div class="sum-ser-vals">';
      if(sr.pr||sr.pw){
        c+='<span style="color:var(--muted);font-size:12px">'+fmtPrev(sr.pr,sr.pw)+'</span>';
        c+='<span class="sum-arrow">→</span>';
      }
      c+='<span class="sum-val">'+fmtPrev(sr.r,sr.w)+'</span>';
      if(sr.r&&sr.pr){var rd=Math.round((parseFloat(sr.r)-parseFloat(sr.pr))*10)/10;if(rd>0)c+='<span class="sdiff sdiff-up">+'+rd+' rep</span>';else if(rd<0)c+='<span class="sdiff sdiff-down">'+rd+' rep</span>';}
      if(sr.w&&sr.pw){var wd=Math.round((parseFloat(sr.w)-parseFloat(sr.pw))*10)/10;if(wd>0)c+='<span class="sdiff sdiff-up">+'+wd+'kg</span>';else if(wd<0)c+='<span class="sdiff sdiff-down">'+wd+'kg</span>';}
      c+='</div></div>';
    }
    c+='</div>';
    if(st==='up')upL.push(c); else if(st==='same')sameL.push(c); else if(st==='down')downL.push(c); else newL.push(c);
  }

  var emoji='💪',headline='Treino salvo!';
  if(nUp>0&&nDown===0){emoji='🔥';headline='Treino foda!';}
  else if(nUp>0&&nDown>0){emoji='📈';headline='Progresso misto';}
  else if(nDown>0&&nUp===0){emoji='😤';headline='Próximo será melhor';}
  else if(nNew>0){emoji='⭐';headline='Primeira sessão!';}

  document.getElementById('sumEmoji').textContent=emoji;
  document.getElementById('sumHeadline').textContent=headline;
  document.getElementById('sumSub').textContent=label;
  document.getElementById('sumDuration').textContent=elapsed>0?'⏱ Duração: '+formatDuration(elapsed):'';
  document.getElementById('sumStats').innerHTML=
    '<div class="sum-stat"><div class="sum-stat-num stat-g">'+nUp+'</div><div class="sum-stat-lbl">Subiram</div></div>'+
    '<div class="sum-stat"><div class="sum-stat-num stat-y">'+nSame+'</div><div class="sum-stat-lbl">Igual</div></div>'+
    '<div class="sum-stat"><div class="sum-stat-num stat-r">'+nDown+'</div><div class="sum-stat-lbl">Caíram</div></div>';
  document.getElementById('sumUp').innerHTML  =upL.length  ?'<div class="sum-sec-title">↑ Subiram</div>'+upL.join(''):'';
  document.getElementById('sumSame').innerHTML=sameL.length?'<div class="sum-sec-title">= Mantiveram</div>'+sameL.join(''):'';
  document.getElementById('sumDown').innerHTML=downL.length?'<div class="sum-sec-title">↓ Caíram</div>'+downL.join(''):'';
  document.getElementById('sumNew').innerHTML =newL.length ?'<div class="sum-sec-title">★ Primeiros dados</div>'+newL.join(''):'';
  document.getElementById('summaryBg').classList.add('open');
  document.getElementById('summaryBg').scrollTop=0;
}

renderT('a1');
</script>
